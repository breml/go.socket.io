name: Contributors

on:
  push:
    branches: [ master ]

permissions:
  contents: write

jobs:
  contributors:
    name: Update contributors
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update contributors
        uses: akhilmhdh/contributors-readme-action@v2.3.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          readme_path: README.md
          columns_per_row: 6
          image_size: 80
